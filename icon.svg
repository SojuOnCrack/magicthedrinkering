      <path d="M79 150 C110 140 143 155 174 146 L174 167 C150 170 118 162 79 174 Z" fill="#5a3410"></path>
      <circle cx="95" cy="176" r="10" fill="#7a4a17"></circle>
      <circle cx="164" cy="84" r="8" fill="#7a4a17"></circle>
    </g>

    <!-- Risse / Cuts -->
    <g stroke="#6e4510" stroke-width="2" stroke-linecap="round" opacity="0.55">
      <path d="M88 74 L96 83 L92 90"></path>
      <path d="M161 73 L154 82 L159 88"></path>
      <path d="M175 146 L166 153 L170 161"></path>
      <path d="M83 154 L90 162 L86 170"></path>
      <path d="M120 191 L126 183 L132 191"></path>
    </g>

    <!-- Titelzeile -->
    <rect x="89" y="72" width="76" height="12" rx="4" fill="#7b5414" opacity="0.2"></rect>

    <!-- Artbox -->
    <rect x="88" y="91" width="78" height="56" rx="6" fill="#4a3210" opacity="0.12"></rect>

    <!-- Ring Illustration -->
    <g transform="translate(127 119)">
      <circle r="24" fill="#fff3cb" opacity="0.16"></circle>
      <ellipse rx="21" ry="13.5" fill="none" stroke="url(#ringGold)" stroke-width="7"></ellipse>
      <ellipse rx="11.5" ry="7" fill="none" stroke="#fff4c8" stroke-width="2.5"></ellipse>
      <path d="M0-27 L3-18 L12-16 L5-11 L7-2 L0-8 L-7-2 L-5-11 L-12-16 L-3-18 Z" fill="#ffe27a" opacity="0.9"></path>
      <path d="M-24 5 L-18 1 L-20 -6 L-14 -2 L-8 -8 L-8 -1 L-2 0 L-7 4 L-5 10 L-11 6 L-17 10 L-15 4 Z" fill="#f8dd72" opacity="0.55"></path>
      <path d="M24 5 L18 1 L20 -6 L14 -2 L8 -8 L8 -1 L2 0 L7 4 L5 10 L11 6 L17 10 L15 4 Z" fill="#f8dd72" opacity="0.55"></path>
    </g>

    <!-- Textbereich -->
    <rect x="89" y="155" width="52" height="8" rx="4" fill="#6b4a11" opacity="0.18"></rect>
    <rect x="89" y="168" width="69" height="8" rx="4" fill="#6b4a11" opacity="0.12"></rect>
    <rect x="89" y="180" width="61" height="6" rx="3" fill="#6b4a11" opacity="0.09"></rect>
  </g>

  <!-- Realistischere Bierflasche -->
  <g filter="url(#softGlow)">
    <!-- Flaschenschatten -->
    <ellipse cx="129" cy="176" rx="23" ry="8" fill="#000" opacity="0.18"></ellipse>

    <!-- Hals -->
    <path d="
      M120 82
      C120 79 122 77 125 77
      L131 77
      C134 77 136 79 136 82
      L136 106
      C136 109 134 111 131 111
      L125 111
      C122 111 120 109 120 106
