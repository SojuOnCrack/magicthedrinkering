      L174 58
      Q181 58 181 66
      L181 92
      L176 97
      L181 104
      L181 146
      L175 151
      L181 158
      L181 191
      Q181 198 173 198
      L154 198
      L148 193
      L141 198
      L109 198
      L102 193
      L94 198
      L79 198
      Q72 198 72 191
      L72 165
      L78 158
      L72 152
      L72 114
      L77 108
      L72 101
      L72 67
      Q72 60 80 58
      Z" fill="url(#cardEdge)" stroke="#5e3900" stroke-width="5"></path>

    <!-- Innenfläche -->
    <path d="
      M85 65
      L169 65
      Q174 65 174 71
      L174 91
      L170 97
      L174 103
      L174 145
      L169 151
      L174 157
      L174 186
      Q174 191 168 191
      L153 191
      L147 187
      L141 191
      L111 191
      L104 186
      L97 191
      L84 191
      Q79 191 79 185
      L79 165
      L84 158
      L79 152
      L79 116
      L83 109
      L79 102
      L79 72
      Q79 66 85 65
      Z" fill="url(#cardInner)"></path>

    <!-- Abnutzung / Flecken -->
    <g opacity="0.18" clip-path="url(#cardClip)">
