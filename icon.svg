<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="MagicTheDrinkering Icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140d24"></stop>
      <stop offset="55%" stop-color="#2d1a4d"></stop>
      <stop offset="100%" stop-color="#5a31a8"></stop>
    </linearGradient>

    <linearGradient id="cardEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3dfa9"></stop>
      <stop offset="100%" stop-color="#b98a33"></stop>
    </linearGradient>

    <linearGradient id="cardInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecd9a7"></stop>
      <stop offset="100%" stop-color="#d3b06c"></stop>
    </linearGradient>

    <radialGradient id="ringGold" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#fff0b8"></stop>
      <stop offset="55%" stop-color="#efc75d"></stop>
      <stop offset="100%" stop-color="#9a6512"></stop>
    </radialGradient>

    <linearGradient id="glassBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b3f14"></stop>
      <stop offset="20%" stop-color="#7b5922"></stop>
      <stop offset="55%" stop-color="#3c280c"></stop>
      <stop offset="100%" stop-color="#1d1206"></stop>
    </linearGradient>

    <linearGradient id="glassDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2509"></stop>
      <stop offset="100%" stop-color="#120a03"></stop>
    </linearGradient>

    <linearGradient id="beerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8cf5e"></stop>
      <stop offset="35%" stop-color="#e6a21d"></stop>
      <stop offset="100%" stop-color="#9f5a07"></stop>
    </linearGradient>

    <linearGradient id="labelPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e7bc"></stop>
      <stop offset="100%" stop-color="#d4b067"></stop>
    </linearGradient>

    <linearGradient id="capMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe9a5"></stop>
      <stop offset="100%" stop-color="#a8791f"></stop>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="220%" height="220%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"></feDropShadow>
    </filter>

    <clipPath id="cardClip">
      <path d="
        M80 58
        L174 58
        Q181 58 181 66
        L181 92
        L176 97
        L181 104
        L181 146
        L175 151
        L181 158
        L181 191
        Q181 198 173 198
        L154 198
        L148 193
        L141 198
        L109 198
        L102 193
        L94 198
        L79 198
        Q72 198 72 191
        L72 165
        L78 158
        L72 152
        L72 114
        L77 108
        L72 101
        L72 67
        Q72 60 80 58
        Z"></path>
    </clipPath>
  </defs>

  <!-- Hintergrund -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bg)"></rect>

  <!-- Magischer Außenring -->
  <circle cx="128" cy="128" r="84" fill="none" stroke="#cab8ff" stroke-width="7" opacity="0.18"></circle>
  <circle cx="128" cy="128" r="67" fill="none" stroke="#efe7ff" stroke-width="3" opacity="0.3" stroke-dasharray="7 9"></circle>

  <!-- Zerfetzte Karte -->
