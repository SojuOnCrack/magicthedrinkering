    <!-- Labelsymbol -->
    <circle cx="128" cy="137" r="5" fill="none" stroke="#b2852e" stroke-width="2"></circle>
    <path d="M128 132.8 L129.5 136 L133 136.4 L130.3 138.7 L131.1 142 L128 140.2 L124.9 142 L125.7 138.7 L123 136.4 L126.5 136 Z" fill="#b2852e"></path>

    <!-- Glasreflex links -->
    <path d="
      M121 86
      C118 98 118 116 119 138
      C119.5 148 120.2 158 122 165" fill="none" stroke="#fff7e5" stroke-width="2.6" opacity="0.5" stroke-linecap="round"></path>

    <!-- kleiner Reflex rechts -->
    <path d="
      M136 110
      C137 119 137 130 136 143" fill="none" stroke="#fff7e5" stroke-width="1.3" opacity="0.22" stroke-linecap="round"></path>
  </g>

  <!-- Funken -->
  <g fill="#f5d0fe">
    <circle cx="95" cy="102" r="3.5"></circle>
    <circle cx="159" cy="93" r="3"></circle>
    <circle cx="165" cy="142" r="3.5"></circle>
    <circle cx="91" cy="151" r="2.5"></circle>
  </g>

  <!-- Stern -->
  <path d="M128 40l4 10 11 2-8 7 2 11-9-5-9 5 2-11-8-7 11-2z" fill="#fde68a" stroke="#fff7cc" stroke-width="1.5"></path>
</svg>