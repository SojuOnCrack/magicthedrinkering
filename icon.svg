    <!-- Kronkorken -->
    <path d="
      M119 77
      L137 77
      C138 77 139 78 139 79
      L139 85
      L136 87
      L133 85
      L130 87
      L127 85
      L124 87
      L121 85
      L118 87
      L117 85
      L117 79
      C117 78 118 77 119 77
