    <!-- Dunkler Glasrand rechts -->
    <path d="
      M137 98
      C142 101 144 110 146 120
      C148 130 148 146 146 160
      C144 169 138 175 132 176
      " fill="none" stroke="url(#glassDark)" stroke-width="6" opacity="0.45" stroke-linecap="round"></path>

    <!-- Bierfüllung -->
    <path d="
      M115 118
      C117 113 121 111 126 111
      L130 111
      C135 111 139 113 141 118
      L143 126
      C145 134 145 143 144 151
      L143 157
      C141.8 164 136.2 169 128 169
      C119.8 169 114.2 164 113 157
      L112 151
      C111 143 111 134 113 126
      Z" fill="url(#beerFill)" opacity="0.88"></path>

    <!-- Schaumkante innen -->
    <path d="M116 119 C121 116 135 116 140 119" fill="none" stroke="#f8e9b9" stroke-width="2" opacity="0.55" stroke-linecap="round"></path>

    <!-- Papierlabel -->
    <path d="
      M117 130
      C117 127 119 125 122 125
      L134 125
